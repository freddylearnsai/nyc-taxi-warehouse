name: warehouse
on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 5 * *"
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python load.py
      - run: python run_all.py
      - run: |
          git config user.name "warehouse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add receipts.md exports/
          git commit -m "chore: scheduled warehouse run" || echo "no changes"
          git push
